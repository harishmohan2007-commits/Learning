<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Session — AntiGravity</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #060612;
      --surface: #0e0e22;
      --border: rgba(120, 80, 255, 0.2);
      --purple: #7c3aed;
      --electric: #06b6d4;
      --glow: #a855f7;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(6,182,212,0.1), transparent 70%);
      bottom: -100px; right: -100px;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(6,6,18,0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, var(--purple), var(--electric));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      display: flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--electric); }
    .nav-back::before { content: '← '; }

    main {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 7rem 1.5rem 4rem;
    }

    .booking-container {
      width: 100%;
      max-width: 560px;
    }

    .booking-header {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }
    .event-tag {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--electric);
      border: 1px solid rgba(6,182,212,0.3);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1rem;
    }
    .booking-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 6vw, 3.5rem);
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.6rem;
    }
    .booking-header h1 span {
      background: linear-gradient(90deg, var(--glow), var(--electric));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .booking-header p {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      animation: fadeUp 0.6s 0.15s ease both;
      position: relative;
      overflow: hidden;
    }
    .form-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--electric), transparent);
    }

    .form-group { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    input, select, textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    select option { background: #1a1a2e; }
    textarea { resize: vertical; min-height: 90px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .event-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.4rem;
    }
    .event-option { position: relative; }
    .event-option input[type="radio"] {
      position: absolute; opacity: 0; width: 0; height: 0;
    }
    .event-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 1rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      font-size: 0.82rem;
      transition: all 0.2s;
      background: rgba(255,255,255,0.02);
    }
    .event-option label .icon { font-size: 1.4rem; }
    .event-option input[type="radio"]:checked + label {
      border-color: var(--purple);
      background: rgba(124,58,237,0.12);
      color: var(--text);
      box-shadow: 0 0 0 1px var(--purple);
    }
    .event-option label:hover {
      border-color: rgba(124,58,237,0.5);
      color: var(--text);
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124,58,237,0.4);
    }
    .submit-btn:active { transform: translateY(0); }

    /* SUCCESS STATE */
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
      gap: 1rem;
    }
    .form-card.submitted .form-content { display: none; }
    .form-card.submitted .success-overlay { display: flex; }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--electric));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .success-overlay h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }
    .success-overlay p { color: var(--muted); font-size: 0.9rem; }
    .back-home {
      margin-top: 0.5rem;
      display: inline-block;
      color: var(--electric);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(6,182,212,0.3);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }
    .back-home:hover { border-color: var(--electric); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 500px) {
      nav { padding: 1rem 1.5rem; }
      .form-card { padding: 1.8rem 1.4rem; }
      .form-row { grid-template-columns: 1fr; }
      .event-selector { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">AntiGravity</div>
    <a href="index.html" class="nav-back">Back to Home</a>
  </nav>

  <main>
    <div class="booking-container">

      <div class="booking-header">
        <div class="event-tag">Reserve Your Spot</div>
        <h1>Book a <span>Session</span></h1>
        <p>Fill in your details below and we'll confirm your booking within 24 hours.</p>
      </div>

      <div class="form-card" id="formCard">

        <div class="form-content">
          <form id="bookingForm" onsubmit="handleSubmit(event)">

            <div class="form-group">
              <label>Choose Your Event</label>
              <div class="event-selector">
                <div class="event-option">
                  <input type="radio" name="event" id="event1" value="Aerial Yoga" checked/>
                  <label for="event1">
                    <span class="icon">🧘</span>
                    Aerial Yoga
                  </label>
                </div>
                <div class="event-option">
                  <input type="radio" name="event" id="event2" value="Flying Fitness"/>
                  <label for="event2">
                    <span class="icon">🪂</span>
                    Flying Fitness
                  </label>
                </div>
                <div class="event-option">
                  <input type="radio" name="event" id="event3" value="Inversion Therapy"/>
                  <label for="event3">
                    <span class="icon">🔄</span>
                    Inversion Therapy
                  </label>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" placeholder="Jane" required />
              </div>
              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="jane@example.com" required />
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="date">Preferred Date</label>
                <input type="date" id="date" name="date" required />
              </div>
              <div class="form-group">
                <label for="time">Preferred Time</label>
                <select id="time" name="time" required>
                  <option value="" disabled selected>Select slot</option>
                  <option>6:00 AM</option>
                  <option>8:00 AM</option>
                  <option>10:00 AM</option>
                  <option>12:00 PM</option>
                  <option>4:00 PM</option>
                  <option>6:00 PM</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="level">Experience Level</label>
              <select id="level" name="level" required>
                <option value="" disabled selected>Select your level</option>
                <option>Complete Beginner</option>
                <option>Some Experience</option>
                <option>Intermediate</option>
                <option>Advanced</option>
              </select>
            </div>

            <div class="form-group">
              <label for="notes">Additional Notes <span style="color:var(--muted);text-transform:none;letter-spacing:0">(optional)</span></label>
              <textarea id="notes" name="notes" placeholder="Any injuries, special requirements, or questions..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Confirm Booking →</button>
          </form>
        </div>

        <div class="success-overlay">
          <div class="success-icon">✓</div>
          <h2>You're Booked!</h2>
          <p>We've received your booking request.<br/>Check your email for confirmation within 24 hours.</p>
          <a href="index.html" class="back-home">← Return to Home</a>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Pre-select event from URL param e.g. booking.html?event=Aerial+Yoga
    const params = new URLSearchParams(window.location.search);
    const eventParam = params.get('event');
    if (eventParam) {
      document.querySelectorAll('input[name="event"]').forEach(radio => {
        if (radio.value === eventParam) radio.checked = true;
      });
    }

    // Set min date to today
    const dateInput = document.getElementById('date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);

    // Handle form submit
    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        event: form.event.value,
        name: `${form.firstName.value} ${form.lastName.value}`,
        email: form.email.value,
        phone: form.phone.value,
        date: form.date.value,
        time: form.time.value,
        level: form.level.value,
        notes: form.notes.value
      };
      console.log('Booking data:', data);
      // When Flask backend is ready, replace with:
      // fetch('/book', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })

      document.getElementById('formCard').classList.add('submitted');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

</body>
</html>
