<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#0a0a1a"/>
  <rect width="100" height="100" rx="16" fill="none" stroke="#7c3aed" stroke-width="2"/>

  <!-- head -->
  <circle cx="50" cy="22" r="8" fill="#a855f7"/>

  <!-- body -->
  <line x1="50" y1="30" x2="50" y2="62" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>

  <!-- arms stretched up -->
  <line x1="50" y1="40" x2="20" y2="18" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="40" x2="80" y2="18" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

  <!-- hands -->
  <circle cx="20" cy="18" r="3" fill="#06b6d4"/>
  <circle cx="80" cy="18" r="3" fill="#06b6d4"/>

  <!-- legs -->
  <line x1="50" y1="62" x2="30" y2="88" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="70" y2="88" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
</svg>
